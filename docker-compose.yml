services:
  web:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html/
      - ./:/var/www/
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"